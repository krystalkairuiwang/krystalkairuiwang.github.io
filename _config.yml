# Site settings
title: "Krystal Wang"
description: "Projects from Krystal Wang."
baseurl: "" # If you're publishing on GitHub Pages at username.github.io, keep it blank
url: "https://krystalkairuiwang.github.io" # Update with your GitHub Pages URL or custom domain

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-seo-tag
